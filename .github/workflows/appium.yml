name: Appium Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set npm config
        run: npm config set legacy-peer-deps true

      - name: Remove stale lockfile
        run: |
          if (Test-Path package-lock.json) { Remove-Item package-lock.json -Force }
        shell: powershell

      - name: Force local appium to v3
        run: |
          npm uninstall appium --legacy-peer-deps
          npm install appium@next --save --legacy-peer-deps

      - name: Install project dependencies
        run: npm install --legacy-peer-deps

      - name: Install Appium 3 globally
        run: npm install -g appium@next

      - name: Verify Appium version (must be 3.x)
        run: appium --version

      - name: Install Appium Windows Driver
        run: appium driver install --source=npm appium-windows-driver

      - name: Verify Windows Driver installed
        run: appium driver list --installed

      - name: Start Appium server
        shell: powershell
        run: |
          # Use the .cmd wrapper — avoids spawn EINVAL from passing .ps1 or .js paths to node
          $npmPrefix = npm prefix -g
          $appiumCmd = "$npmPrefix\appium.cmd"
          Write-Host "Appium cmd path: $appiumCmd"

          if (-not (Test-Path $appiumCmd)) {
            # fallback: search common locations
            $appiumCmd = "C:\npm\prefix\appium.cmd"
            Write-Host "Fallback path: $appiumCmd"
          }

          $psi = New-Object System.Diagnostics.ProcessStartInfo
          $psi.FileName = $appiumCmd
          $psi.Arguments = "--port 4723"
          $psi.RedirectStandardOutput = $true
          $psi.RedirectStandardError = $true
          $psi.UseShellExecute = $false
          $psi.CreateNoWindow = $true

          $process = New-Object System.Diagnostics.Process
          $process.StartInfo = $psi

          # Async log capture to files
          $outFile = [System.IO.StreamWriter]::new("appium.log", $false)
          $errFile = [System.IO.StreamWriter]::new("appium-error.log", $false)

          $process.add_OutputDataReceived({ param($s,$e) if ($e.Data) { $outFile.WriteLine($e.Data); $outFile.Flush() } })
          $process.add_ErrorDataReceived({ param($s,$e) if ($e.Data) { $errFile.WriteLine($e.Data); $errFile.Flush() } })

          $process.Start() | Out-Null
          $process.BeginOutputReadLine()
          $process.BeginErrorReadLine()

          Write-Host "Appium started with PID: $($process.Id)"

      - name: Wait for Appium to be ready
        shell: powershell
        run: |
          $timeout = 120
          $elapsed = 0
          $ready = $false

          Write-Host "Waiting for Appium to initialize..."
          Start-Sleep -Seconds 10

          while ($elapsed -lt $timeout) {
            Start-Sleep -Seconds 3
            $elapsed += 3
            try {
              $response = Invoke-WebRequest -Uri "http://127.0.0.1:4723/status" -UseBasicParsing -TimeoutSec 3 -ErrorAction Stop
              $statusCode = $response.StatusCode
              Write-Host "HTTP status: $statusCode (${elapsed}s elapsed)"
              if ($statusCode -eq 200) {
                Write-Host "Appium is ready!"
                $ready = $true
                break
              }
            } catch {
              Write-Host "Not ready yet (${elapsed}s elapsed): $_"
            }
          }

          if (-not $ready) {
            Write-Host "=== appium.log ==="
            Get-Content appium.log -ErrorAction SilentlyContinue
            Write-Host "=== appium-error.log ==="
            Get-Content appium-error.log -ErrorAction SilentlyContinue
            throw "Appium did not start within $timeout seconds"
          }

      - name: Run tests
        run: node test_sample.js

      - name: Print Appium logs
        if: always()
        shell: powershell
        run: |
          Write-Host "=== appium.log ==="
          Get-Content appium.log -ErrorAction SilentlyContinue
          Write-Host "=== appium-error.log ==="
          Get-Content appium-error.log -ErrorAction SilentlyContinue
