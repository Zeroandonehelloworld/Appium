name: Appium Android Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── REMOVED: Do NOT start ADB manually here ──
      # Let android-emulator-runner manage ADB timing

      - name: Install Appium + UiAutomator2 driver
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2
          appium driver list --installed

      - name: Install project dependencies
        run: npm install --legacy-peer-deps

      - name: Install wait-on globally   # good to have
        run: npm install -g wait-on

      - name: Run Appium tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          target: google_apis_playstore   # good choice (includes Play Store)
          avd-name: test_avd
          force-avd-creation: false
          startup-timeout: 600            # generous
          emulator-options: >-
            -no-snapshot-save
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -no-metrics
          disable-animations: true
          script: |
            # Quick check
            echo "ADB devices right after emulator start:"
            adb devices || true

            # Robust boot wait (your version is good)
            echo "Waiting for sys.boot_completed..."
            BOOT_TIMEOUT=480
            ELAPSED=0
            until adb shell getprop sys.boot_completed 2>/dev/null | grep -q "^1$"; do
              if [ "$ELAPSED" -ge "$BOOT_TIMEOUT" ]; then
                echo "Emulator boot timeout after ${ELAPSED}s"
                adb devices || true
                adb logcat -d | tail -n 50 || true
                exit 1
              fi
              echo "  ... waiting (${ELAPSED}s)"
              sleep 10
              ELAPSED=$((ELAPSED + 10))
            done
            echo "Emulator fully booted after ${ELAPSED}s"

            sleep 10   # let Play Store / system settle more

            # Start Appium
            appium --port 4723 --log appium.log --log-level info --base-path '/' &
            APPIUM_PID=$!

            # Wait for Appium
            wait-on tcp:127.0.0.1:4723 --timeout 90000 --interval 2000 || {
              echo "Appium startup failed:"
              cat appium.log
              kill $APPIUM_PID 2>/dev/null
              exit 1
            }
            echo "Appium ready"

            # Run test
            node test_sample.js
            TEST_EXIT=$?

            # Logs + cleanup
            echo "Appium logs:"
            cat appium.log || true
            kill $APPIUM_PID 2>/dev/null || true
            exit $TEST_EXIT

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: |
            screenshot*.png
          if-no-files-found: warn

      - name: Upload Appium logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-logs
          path: appium.log
          if-no-files-found: warn
