name: Appium Android Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable KVM acceleration for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Appium + UiAutomator2 driver
        env:
          APPIUM_HOME: /home/runner/.appium
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2
          appium driver list --installed

      - name: Install project dependencies
        run: npm install --legacy-peer-deps

      - name: Debug – show basic environment info
        run: |
          pwd
          ls -la
          echo "Testing with built-in Play Store (no APK needed)"

      - name: Run Appium tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          APPIUM_HOME: /home/runner/.appium
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          target: google_apis
          avd-name: test_avd
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            appium --port 4723 --log appium.log --log-level info &
            APPIUM_PID=$!

            npx wait-on tcp:4723 --timeout 60000 --log --interval 3000 || { cat appium.log; kill $APPIUM_PID; exit 1; }

            echo "Appium server is ready!"

            node test_sample.js
            TEST_EXIT=$?

            echo "=== Appium logs ==="
            cat appium.log || true

            kill $APPIUM_PID 2>/dev/null || true
            exit $TEST_EXIT
