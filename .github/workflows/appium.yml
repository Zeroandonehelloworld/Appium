name: Appium Android Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable KVM acceleration for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Appium + UiAutomator2 driver
        env:
          APPIUM_HOME: /home/runner/.appium
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2
          appium driver list --installed

      - name: Install project dependencies
        run: npm install --legacy-peer-deps

      - name: Debug – show basic environment info
        run: |
          pwd
          ls -la
          echo "Testing with built-in Play Store (no APK needed)"

      - name: Run Appium tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          target: google_apis
          avd-name: test_avd
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            echo "Starting Appium..."
            appium --port 4723 --log appium.log --log-level info &
            APPIUM_PID=$!

            echo "Waiting for Appium to be ready (with retries)..."
            i=1
            while [ $i -le 12 ]
            do
              echo "Attempt $i/12: Checking port 4723..."
              if npx wait-on tcp:4723 --timeout 90000 --log; then
                echo "Appium is ready!"
                break
              fi
              echo "Not ready yet, waiting 30s more..."
              sleep 30
              i=$((i+1))
            done

            if ! npx wait-on tcp:4723 --timeout 10000; then
              echo "Appium failed to start after retries"
              cat appium.log
              kill $APPIUM_PID || true
              exit 1
            fi

            echo "Appium server is ready! Running tests..."
            node test_sample.js
            TEST_EXIT=$?

            echo "=== Appium logs ==="
            cat appium.log || true

            kill $APPIUM_PID 2>/dev/null || true
            exit $TEST_EXIT
