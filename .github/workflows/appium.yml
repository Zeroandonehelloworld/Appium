name: Appium Android Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Enable KVM for hardware acceleration (required on GitHub Actions)
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Appium 3 + UiAutomator2
        run: |
          npm install -g appium@next
          appium driver install uiautomator2
          appium --version

      - name: Install project dependencies
        run: npm install --legacy-peer-deps

      - name: Verify APK exists
        run: |
          if [ ! -f "app/app.apk" ]; then
            echo "APK NOT FOUND at app/app.apk"
            echo "Commit your APK to ./app/app.apk OR uncomment the download step"
            exit 1
          fi
          echo "APK found: $(ls -lh app/app.apk)"

      # This action handles: AVD creation, emulator boot, KVM, wait-for-boot
      - name: Run tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          target: google_apis
          avd-name: test_avd
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            # Start Appium in background
            appium --port 4723 --log appium.log --log-level info &
            APPIUM_PID=$!
            echo "Appium PID: $APPIUM_PID"

            # Wait for Appium ready
            TIMEOUT=60
            ELAPSED=0
            until curl -sf http://127.0.0.1:4723/status > /dev/null 2>&1; do
              sleep 3
              ELAPSED=$((ELAPSED + 3))
              echo "Waiting for Appium... ${ELAPSED}s"
              if [ $ELAPSED -ge $TIMEOUT ]; then
                echo "=== appium.log ==="
                cat appium.log || true
                exit 1
              fi
            done
            echo "Appium is ready!"

            # Run tests
            node test_sample.js
            TEST_EXIT=$?

            # Print logs
            echo "=== appium.log ==="
            cat appium.log || true

            kill $APPIUM_PID 2>/dev/null || true
            exit $TEST_EXIT
