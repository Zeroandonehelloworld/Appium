name: Appium Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # ← updated to v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'        # ← 18 is more stable for Appium Windows right now

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Appium 2 and dependencies
        run: |
          npm install -g appium@2
          npm install
          # If your test project has package.json with appium as devDependency → npm install is enough

      - name: Install Appium Windows driver
        run: appium driver install windows

      - name: Install known-good WinAppDriver 1.2.1
        shell: powershell
        run: |
          $wadUrl = "https://github.com/microsoft/WinAppDriver/releases/download/v1.2.1/WinAppDriver.msi"
          $msiPath = "$env:TEMP\WinAppDriver.msi"
          Write-Host "Downloading WinAppDriver 1.2.1..."
          Invoke-WebRequest -Uri $wadUrl -OutFile $msiPath
          Write-Host "Installing WinAppDriver (quiet mode)..."
          Start-Process msiexec.exe -ArgumentList "/i $msiPath /quiet /norestart" -Wait
          Write-Host "WinAppDriver installation finished."

      - name: Start Appium server in background
        shell: powershell
        run: |
          $job = Start-Job -ScriptBlock {
            appium server --port 4723 --log appium.log --log-level debug
          }
          Start-Sleep -Seconds 8   # give it some time to start

          # Optional: you can also try foreground if background fails too often:
          # appium server --port 4723 --log appium.log > appium-out.log 2> appium-error.log

      - name: Wait for Appium to be ready
        shell: powershell
        run: |
          $timeoutSeconds = 90
          $elapsed = 0
          $ready = $false

          while ($elapsed -lt $timeoutSeconds) {
            Start-Sleep -Seconds 3
            $elapsed += 3

            try {
              $response = Invoke-WebRequest -Uri "http://127.0.0.1:4723/status" -Method Get -UseBasicParsing -TimeoutSec 5
              $status = $response.StatusCode
              Write-Host "Status code: $status  ($elapsed s)"
              if ($status -eq 200) {
                $content = $response.Content | ConvertFrom-Json
                if ($content.value.ready -eq $true) {
                  Write-Host "Appium is ready!"
                  $ready = $true
                  break
                }
              }
            }
            catch {
              Write-Host "Still waiting... $_"
            }
          }

          if (-not $ready) {
            throw "Appium server did not become ready within $timeoutSeconds seconds"
          }

      - name: Run tests
        run: node test_sample.js
        env:
          APPIUM_HOST: 127.0.0.1
          APPIUM_PORT: 4723

      - name: Print Appium logs (always)
        if: always()
        shell: powershell
        run: |
          Write-Host "================ APP LOG ================"
          Get-Content appium.log -ErrorAction SilentlyContinue | Select-Object -Last 60
          Write-Host "=================== END ================="

      - name: Stop Appium (cleanup)
        if: always()
        shell: powershell
        run: |
          try {
            Get-Job | Stop-Job -ErrorAction SilentlyContinue
            Get-Job | Remove-Job -ErrorAction SilentlyContinue
          } catch {}
