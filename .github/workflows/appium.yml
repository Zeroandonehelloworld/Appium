name: Appium Android Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # ← Switched back to 20 to avoid joi EBADENGINE warning with wait-on deps

      - name: Enable KVM acceleration for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Appium + UiAutomator2 driver (with debug)
        run: |
          npm install -g appium@2.5.4 --verbose
          appium driver install uiautomator2@3.0.3
          appium driver list --installed
          appium --version
          which appium

      - name: Install project dependencies (with verbose)
        run: npm install --legacy-peer-deps --verbose

      - name: Debug – show environment info
        run: |
          pwd
          ls -la
          npm list -g --depth=0 || true
          echo "Testing with built-in Play Store (no APK needed)"

      - name: Run Appium tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_5
          target: google_apis
          avd-name: test_avd
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            echo "Starting Appium in debug mode on localhost..."
            appium --address 127.0.0.1 --port 4723 --log appium.log --log-level debug &
            APPIUM_PID=$!

            echo "Waiting for Appium HTTP endpoint (more reliable than plain TCP)..."
            npx wait-on --timeout 240000 --interval 5000 --log http-get://127.0.0.1:4723/status || { cat appium.log; kill $APPIUM_PID; exit 1; }
            echo "Appium server is ready and responding!"

            echo "Quick checks:"
            adb devices
            curl -s http://127.0.0.1:4723/status || echo "Curl status check failed"

            echo "Waiting for emulator full boot..."
            adb wait-for-device
            until adb shell getprop sys.boot_completed | grep -q "1"; do
              echo "Emulator still booting..."
              sleep 6
            done
            echo "Emulator fully booted!"

            adb shell input keyevent 82 &>/dev/null || true
            sleep 10

            echo "Running your test script..."
            node test_sample.js
            TEST_EXIT=$?

            echo "=== Full Appium logs ==="
            cat appium.log || true

            kill $APPIUM_PID 2>/dev/null || true
            exit $TEST_EXIT
