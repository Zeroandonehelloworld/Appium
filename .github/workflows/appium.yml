name: Appium Android Tests - Play Store

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable KVM (for emulator acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Appium + UiAutomator2 driver
        run: |
          npm install -g appium@next
          appium driver install uiautomator2
          appium driver list --installed

      - name: Install project dependencies
        run: npm install webdriverio @wdio/utils --legacy-peer-deps   # only what's needed

      - name: Debug - list repo contents
        run: |
          pwd
          ls -la
          find . -type f \( -name "*.apk" -o -name "*.js" -o -name "*.yml" \)

      - name: Start emulator + Appium + Run test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            # Start Appium in background
            appium --port 4723 --log appium.log --log-level info &
            APPIUM_PID=$!

            # Wait for Appium to be ready (very reliable)
            npx wait-on tcp:4723 --timeout 90000 --log --interval 2000 || { cat appium.log; kill $APPIUM_PID; exit 1; }

            echo "Appium server is ready!"

            # Run the test
            node test_sample.js
            TEST_EXIT=$?

            # Show logs only if test failed (save quota)
            if [ $TEST_EXIT -ne 0 ]; then
              echo "=== Appium logs (failure) ==="
              cat appium.log
            fi

            # Cleanup
            kill $APPIUM_PID 2>/dev/null || true

            exit $TEST_EXIT

      - name: Upload screenshot artifact (even on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            screenshot.png
            error-screenshot.png
          if-no-files-found: warn
