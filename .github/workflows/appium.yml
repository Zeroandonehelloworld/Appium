name: Appium Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm install

      - name: Install Appium 3 globally
        run: npm install -g appium@next

      - name: Verify Appium version
        run: appium --version

      - name: Install Appium Windows Driver from npm
        run: appium driver install --source=npm appium-windows-driver

      - name: Verify Windows Driver installed
        run: appium driver list --installed

      - name: Start Appium server
        shell: powershell
        run: |
          $appiumCmd = (Get-Command appium).Source
          Write-Host "Starting Appium from: $appiumCmd"
          Start-Process -NoNewWindow `
            -FilePath "node.exe" `
            -ArgumentList $appiumCmd `
            -RedirectStandardOutput "appium.log" `
            -RedirectStandardError "appium-error.log"
          Write-Host "Appium process started."

      - name: Wait for Appium to be ready
        shell: powershell
        run: |
          $timeout = 90
          $elapsed = 0
          $ready = $false

          Write-Host "Waiting for Appium to initialize..."
          Start-Sleep -Seconds 5

          while ($elapsed -lt $timeout) {
            Start-Sleep -Seconds 3
            $elapsed += 3
            try {
              $statusCode = curl.exe -s -o NUL -w "%{http_code}" http://127.0.0.1:4723/status 2>$null
              Write-Host "HTTP status: $statusCode (${elapsed}s elapsed)"
              if ($statusCode -eq "200") {
                Write-Host "Appium is ready!"
                $ready = $true
                break
              }
            } catch {
              Write-Host "Curl check failed, retrying..."
            }
          }

          if (-not $ready) {
            Write-Host "=== appium.log ==="
            Get-Content appium.log -ErrorAction SilentlyContinue
            Write-Host "=== appium-error.log ==="
            Get-Content appium-error.log -ErrorAction SilentlyContinue
            throw "Appium did not start within $timeout seconds"
          }

      - name: Run tests
        run: node test_sample.js

      - name: Print Appium logs
        if: always()
        shell: powershell
        run: |
          Write-Host "=== appium.log ==="
          Get-Content appium.log -ErrorAction SilentlyContinue
          Write-Host "=== appium-error.log ==="
          Get-Content appium-error.log -ErrorAction SilentlyContinue
