name: Appium Android Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Appium + UiAutomator2 driver
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2
          appium driver list --installed

      - name: Install project dependencies
        run: npm install --legacy-peer-deps

      - name: Install wait-on globally
        run: npm install -g wait-on

      - name: Run Appium tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          target: google_apis_playstore
          avd-name: test_avd
          force-avd-creation: false
          emulator-boot-timeout: 900          # ← correct param: up to 15 min boot wait
          emulator-options: >-
            -no-snapshot-save
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -no-metrics
          disable-animations: true
          script: |
            echo "=== Early check: ADB devices ==="
            adb devices || true

            echo "=== Waiting for emulator to fully boot (sys.boot_completed) ==="
            timeout=900
            elapsed=0
            until [ "$(adb shell getprop sys.boot_completed 2>/dev/null)" = "1" ]; do
              if [ $elapsed -ge $timeout ]; then
                echo "❌ Boot timeout after ${elapsed}s"
                adb devices || true
                adb logcat -d | tail -n 100 || true
                exit 1
              fi
              echo "  ... still booting (${elapsed}s elapsed)"
              sleep 10
              elapsed=$((elapsed + 10))
            done
            echo "✅ Boot completed after ${elapsed}s"

            sleep 15  # extra settle time for Play Store / Google services

            echo "=== Starting Appium ==="
            appium --port 4723 --log appium.log --log-level info --base-path '/' &
            APPIUM_PID=$!

            echo "=== Waiting for Appium to listen on 4723 ==="
            wait-on tcp:127.0.0.1:4723 --timeout 90000 --interval 2000 || {
              echo "Appium failed to start:"
              cat appium.log || true
              kill $APPIUM_PID 2>/dev/null || true
              exit 1
            }
            echo "✅ Appium ready!"

            echo "=== Running test script ==="
            node test_sample.js
            TEST_EXIT=$?

            echo "=== Appium logs (always shown for debug) ==="
            cat appium.log || true

            kill $APPIUM_PID 2>/dev/null || true
            exit $TEST_EXIT

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: |
            screenshot*.png
            error*.png
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Appium logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-logs
          path: appium.log
          if-no-files-found: warn
          retention-days: 7
