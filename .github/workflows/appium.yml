name: Appium Android Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Appium + UiAutomator2
        env:
          APPIUM_HOME: /home/runner/.appium
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2
          appium driver list --installed

      - name: Install project dependencies
        run: npm install --legacy-peer-deps

      # ── Add your build step here ────────────────────────────────
      - name: Build debug APK           # ← most important missing piece
        run: ./gradlew assembleDebug    # adjust command / module if needed

      - name: Debug – show APK location
        run: |
          pwd
          find . -name "*.apk" || true
          ls -la app/build/outputs/apk/debug || true

      - name: Run tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          APPIUM_HOME: /home/runner/.appium
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          target: google_apis
          avd-name: test_avd
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          working-directory: .     # usually not needed, but can help
          script: |
            appium --port 4723 --log appium.log --log-level info &
            APPIUM_PID=$!
            npx wait-on http://127.0.0.1:4723/status --timeout 60000 || { cat appium.log; kill $APPIUM_PID; exit 1; }
            echo "Appium is ready!"
            node test_sample.js
            TEST_EXIT=$?
            cat appium.log || true
            kill $APPIUM_PID 2>/dev/null || true
            exit $TEST_EXIT
            
