name: Appium Android Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java ──────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 4. KVM acceleration ───────────────────────────────────────────────────
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── 5. Start ADB daemon BEFORE emulator runner ────────────────────────────
      - name: Start ADB server
        run: |
          adb start-server
          sleep 2
          adb version
          adb devices

      # ── 6. Appium + UiAutomator2 ─────────────────────────────────────────────
      - name: Install Appium + UiAutomator2 driver
        env:
          APPIUM_HOME: /home/runner/.appium
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2
          appium driver list --installed

      # ── 7. Project dependencies ───────────────────────────────────────────────
      - name: Install project dependencies
        run: npm install --legacy-peer-deps

      # ── 8. wait-on ────────────────────────────────────────────────────────────
      - name: Install wait-on globally
        run: npm install -g wait-on

      # ── 9. Run tests inside Android emulator ──────────────────────────────────
      - name: Run Appium tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          APPIUM_HOME: /home/runner/.appium
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          target: google_apis_playstore
          avd-name: test_avd
          force-avd-creation: false
          emulator-options: >-
            -no-snapshot-save
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -no-metrics
          disable-animations: true
          script: |
            echo "=== ADB devices at script start ==="
            adb devices

            # ── Wait until Android has fully booted ───────────────────────
            echo "=== Waiting for sys.boot_completed ==="
            BOOT_TIMEOUT=300
            ELAPSED=0
            until adb -s emulator-5554 shell getprop sys.boot_completed 2>/dev/null | grep -q "^1$"; do
              if [ "$ELAPSED" -ge "$BOOT_TIMEOUT" ]; then
                echo "❌ Emulator did not fully boot within ${BOOT_TIMEOUT}s"
                adb devices
                exit 1
              fi
              echo "  ... still booting (${ELAPSED}s elapsed)"
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done
            echo "✅ Android fully booted after ${ELAPSED}s"

            # ── Let system services settle ────────────────────────────────
            sleep 8

            echo "=== Android version ==="
            adb -s emulator-5554 shell getprop ro.build.version.release

            # ── Start Appium ──────────────────────────────────────────────
            echo "=== Starting Appium ==="
            appium --port 4723 \
                   --log appium.log \
                   --log-level info \
                   --base-path '/' &
            APPIUM_PID=$!

            # ── Wait until Appium is ready ────────────────────────────────
            wait-on tcp:127.0.0.1:4723 --timeout 90000 --interval 3000 \
              || { echo "=== Appium failed to start ==="; cat appium.log; kill "$APPIUM_PID"; exit 1; }
            echo "✅ Appium server is ready!"

            # ── Run the test ──────────────────────────────────────────────
            node test_sample.js
            TEST_EXIT=$?

            echo "=== Appium logs ==="
            cat appium.log || true

            kill "$APPIUM_PID" 2>/dev/null || true
            exit $TEST_EXIT

      # ── 10. Upload screenshots ────────────────────────────────────────────────
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-screenshots
          path: |
            screenshot.png
            screenshot_1_launch.png
            screenshot_2_results.png
          if-no-files-found: warn
          retention-days: 14

      # ── 11. Upload Appium logs ────────────────────────────────────────────────
      - name: Upload Appium logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-logs
          path: appium.log
          if-no-files-found: warn
          retention-days: 14
          
